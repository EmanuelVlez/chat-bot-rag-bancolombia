###############################################################################
# Bancolombia RAG — Docker Compose
#
# PERFILES:
#   pipeline  — ejecuta el pipeline de datos (scraper → processing → vector_db)
#   app       — levanta el asistente (frontend + agent)
#
# USO RÁPIDO (Windows PowerShell / CMD):
#
#   Primera vez (pipeline + app):
#     docker compose --profile pipeline --profile app up --build
#
#   Solo levantar la app (cuando ya hay datos en el volumen):
#     docker compose --profile app up
#
#   Solo correr el pipeline de datos:
#     docker compose --profile pipeline up --build
#
###############################################################################

services:

  # ── 1. SCRAPER ────────────────────────────────────────────────────────────
  scraper:
    build: ./scraper
    volumes:
      - ./data:/data
    environment:
      RAW_DB_PATH: /data/raw.db
    profiles: [pipeline]

  # ── 2. PROCESSING ─────────────────────────────────────────────────────────
  processing:
    build: ./processing
    volumes:
      - ./data:/data
    environment:
      RAW_DB_PATH:    /data/raw.db
      CHUNKS_DB_PATH: /data/chunks.db
    depends_on:
      scraper:
        condition: service_completed_successfully
    profiles: [pipeline]

  # ── 3. VECTOR DB (indexación) ─────────────────────────────────────────────
  vector_db:
    build: ./vector_db
    volumes:
      - ./data:/data
    environment:
      CHUNKS_DB_PATH: /data/chunks.db
      CHROMA_PATH:    /data/chroma
    depends_on:
      processing:
        condition: service_completed_successfully
    profiles: [pipeline]

  # ── 4. AGENT (FastAPI + LangGraph + MCP server subprocess) ───────────────
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    volumes:
      - ./data:/data
    environment:
      CHROMA_PATH:      /data/chroma
      PROFILES_DB_PATH: /data/user_profiles.db
      OLLAMA_BASE_URL:  ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL:     ${OLLAMA_MODEL:-llama3.1:8b}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      vector_db:
        condition: service_completed_successfully
        required: false
    profiles: [app]

  # ── 5. FRONTEND (Streamlit) ───────────────────────────────────────────────
  frontend:
    build: ./frontend
    environment:
      AGENT_URL: http://agent:8000
    ports:
      - "8501:8501"
    depends_on:
      - agent
    profiles: [app]
