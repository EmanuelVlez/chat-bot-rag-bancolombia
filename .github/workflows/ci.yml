name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff

      # ── Linting ────────────────────────────────────────────────────
      - name: Lint scraper
        run: ruff check scraper/app/

      - name: Lint processing
        run: ruff check processing/app/

      - name: Lint vector_db
        run: ruff check vector_db/app/

      - name: Lint mcp_server
        run: ruff check mcp_server/app/

      - name: Lint agent
        run: ruff check agent/app/

      - name: Lint frontend
        run: ruff check frontend/app/

      # ── Tests unitarios ────────────────────────────────────────────
      - name: Install test dependencies
        run: |
          pip install pytest
          pip install langchain-text-splitters tiktoken
          pip install sentence-transformers chromadb

      - name: Run unit tests
        run: pytest tests/ -v
